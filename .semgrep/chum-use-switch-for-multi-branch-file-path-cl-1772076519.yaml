rules:
  - id: chum-stingray-path-classification-use-switch
    paths:
      include:
        - internal/temporal/stingray_activities.go
    patterns:
      - pattern-either:
          - pattern: |
              if $PATH == "" {
                ...
              } else if !filepath.IsAbs($PATH) {
                ...
              } else if filepath.IsAbs($PATH) {
                ...
              } else {
                ...
              }
          - pattern: |
              if $PATH == "" {
                ...
              } else if filepath.IsAbs($PATH) {
                ...
              } else if !filepath.IsAbs($PATH) {
                ...
              } else {
                ...
              }
          - pattern: |
              if len($PATH) == 0 {
                ...
              } else if !filepath.IsAbs($PATH) {
                ...
              } else if filepath.IsAbs($PATH) {
                ...
              } else {
                ...
              }
          - pattern: |
              if len($PATH) == 0 {
                ...
              } else if filepath.IsAbs($PATH) {
                ...
              } else if !filepath.IsAbs($PATH) {
                ...
              } else {
                ...
              }
    message: |
      Use a `switch` for multi-branch file-path classification (empty, repo-relative, absolute, fallback) instead of an if/else chain.
      This avoids `gocritic/ifElseChain` and reduces branch drift when new path states are added.
    languages: [go]
    severity: WARNING