# CHUM Agent Orchestrator — Minimal Config
# One model (codex), no cambrian explosion, no turtle consensus.

[general]
tick_interval = "1m"
max_per_tick = 3
max_concurrent_coders = 3
max_concurrent_reviewers = 2
max_concurrent_total = 4
stuck_timeout = "30m"
max_retries = 2
log_level = "info"
slow_step_threshold = "2m"
state_db = "~/.local/share/chum/chum.db"

[projects.chum]
enabled = true
morsels_dir = "~/projects/cortex/.morsels"
workspace = "~/projects/cortex"
priority = 0

[projects.chum.dod]
checks = [
    "go test ./...",
    "go vet ./...",
    "GOFLAGS=-buildvcs=false golangci-lint run --timeout=5m --allow-parallel-runners --new-from-rev=HEAD~1",
]
coverage_min = 70
require_estimate = true
require_acceptance = true

[projects.golf-directory]
enabled = true
morsels_dir = "~/projects/golf-directory/.morsels"
workspace = "~/projects/golf-directory"
priority = 1

[projects.golf-directory.dod]
checks = [
    "npm run build",
]
require_estimate = true
require_acceptance = true

[rate_limits]
window_5h_cap = 999999999   # effectively disabled
weekly_cap = 999999999       # effectively disabled
weekly_headroom_pct = 1      # minimal headroom (can't be 0, defaults kicks in)

# --- Codex only ---
[providers.codex]
tier = "fast"
authed = true
model = "gpt-5.3-codex"
cli = "codex"
enabled = true

[providers.codex-medium]
tier = "balanced"
authed = true
model = "gpt-5.3-codex"
cli = "codex-medium"
enabled = true

[providers.codex-high]
tier = "premium"
authed = true
model = "gpt-5.3-codex"
cli = "codex-high"
enabled = true

[tiers]
fast = ["codex"]
balanced = ["codex-medium"]
premium = ["codex-high"]

[health]
check_interval = "2m"
gateway_unit = "openclaw-gateway.service"
gateway_user_service = true

[reporter]
channel = "matrix"
agent_id = "main"
matrix_bot_account = "spritzbot"
default_room = "!adJhqAxLcYqQuYraGf:vmi3041112.contaboserver.net"
admin_room = "!cUBDGkwSjaemsiueKq:vmi3041112.contaboserver.net"
daily_digest_time = "09:00"
weekly_retro_day = "Monday"

[learner]
enabled = false

[api]
bind = "127.0.0.1:8900"

[dispatch.cli.codex]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.codex-medium]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto", "-c", "model_reasoning_effort=medium"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.codex-high]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto", "-c", "model_reasoning_effort=high"]
model_flag = "-m"
approval_flags = []

[dispatch.routing]
fast_backend = "headless_cli"
balanced_backend = "headless_cli"
premium_backend = "headless_cli"
comms_backend = "headless_cli"
retry_backend = "headless_cli"

[dispatch.cost_control]
enabled = true
spark_first = false
enable_planner_v2 = false
planning_candidate_top_k = 5
planning_signal_timeout = "10m"
planning_session_timeout = "30m"
planning_stale_block_threshold = "35m"
retry_escalation_attempt = 2
per_morsel_stage_attempt_limit = 3
stage_attempt_window = "6h"

[dispatch.cost_control.higher_learning]
enabled = false

[dispatch.timeouts]
fast = "15m"
balanced = "30m"
premium = "60m"

[dispatch.git]
branch_prefix = "chum/"
branch_cleanup_days = 7
merge_strategy = "squash"
max_concurrent_per_project = 2

[chief]
enabled = false

[crab]
enabled = false

[calcifier]
enabled = false
