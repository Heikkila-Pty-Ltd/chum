# CHUM Agent Orchestrator Configuration

[general]
tick_interval = "1m"
max_per_tick = 7
max_concurrent_coders = 7
max_concurrent_reviewers = 2
max_concurrent_total = 10
stuck_timeout = "30m"
max_retries = 6
log_level = "info"
slow_step_threshold = "2m"
state_db = "~/.local/share/chum/chum.db"

[projects.chum]
enabled = true
morsels_dir = "~/projects/cortex/.morsels"
workspace = "~/projects/cortex"
priority = 0

[projects.chum.dod]
checks = [
    "go test ./...",
    "go vet ./...",
    "golangci-lint run --timeout=5m --new-from-rev=HEAD~1",
]
coverage_min = 70
require_estimate = true
require_acceptance = true

[projects.golf-directory]
enabled = true
morsels_dir = "~/projects/golf-directory/.morsels"
workspace = "~/projects/golf-directory"
priority = 1

[projects.golf-directory.dod]
checks = [
    "npm run build",
]
require_estimate = true
require_acceptance = true


[rate_limits]
# Claude output tokens — the scarce resource on auth plans.
# 5h rolling window: pause dispatch when approaching ceiling.
# Set to 0 to disable. Tune based on your Anthropic dashboard limits.
window_5h_cap = 2000000
# Weekly cap (resets Friday 14:00 local).
weekly_cap = 10000000
# Reserve 50% of weekly for human use (CHUM uses 50%).
weekly_headroom_pct = 50

# --- Codex (OpenAI) ---
[providers.codex-spark]
tier = "fast"
authed = true
model = ""
cli = "codex"

# --- Claude (Anthropic) — GATED: enabled = false ---
[providers.claude-haiku]
tier = "fast"
authed = true
model = "haiku"
cli = "claude"
enabled = false

[providers.claude-sonnet]
tier = "balanced"
authed = true
model = "sonnet"
cli = "claude"
enabled = false

[providers.claude-opus]
tier = "premium"
authed = true
model = "opus"
cli = "claude"
enabled = false

# --- Gemini (Google) ---
[providers.gemini-flash]
tier = "fast"
authed = true
model = "gemini-2.5-flash"
cli = "gemini"

[providers.gemini-pro]
tier = "balanced"
authed = true
model = "gemini-2.5-pro"
cli = "gemini"

[providers.deepseek-r1]
tier = "balanced"
authed = true
model = "deepseek/deepseek-r1"
cli = "deepseek"
enabled = false

[tiers]
# Active agents: codex + gemini (claude gated off)
fast = ["codex-spark", "gemini-flash"]
balanced = ["codex-spark", "gemini-pro"]
premium = ["codex-spark", "gemini-pro"]

[health]
check_interval = "2m"
gateway_unit = "openclaw-gateway.service"
gateway_user_service = true

[reporter]
channel = "matrix"
agent_id = "main"
matrix_bot_account = "spritzbot"
default_room = "!adJhqAxLcYqQuYraGf:vmi3041112.contaboserver.net"
daily_digest_time = "09:00"
weekly_retro_day = "Monday"

[learner]
enabled = true
analysis_window = "48h"
cycle_interval = "6h"
include_in_digest = true

[api]
bind = "127.0.0.1:8900"

[dispatch.cli.codex]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.claude]
cmd = "claude"
prompt_mode = "stdin"
args = ["--print", "--output-format", "json", "--dangerously-skip-permissions"]
model_flag = "--model"
approval_flags = []

[dispatch.cli.gemini]
cmd = "gemini"
prompt_mode = "stdin"
args = ["-p", "", "--yolo", "-o", "json"]
model_flag = "--model"
approval_flags = []

[dispatch.cli.deepseek]
cmd = "echo"
prompt_mode = "stdin"
args = ["deepseek-backlogged"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.aider]
cmd = "aider"
prompt_mode = "file"
args = ["--yes-always"]
model_flag = "--model"
approval_flags = []

[dispatch.routing]
fast_backend = "headless_cli"
balanced_backend = "headless_cli"
premium_backend = "headless_cli"
comms_backend = "headless_cli"
retry_backend = "headless_cli"

[dispatch.cost_control]
enabled = true
spark_first = true
retry_escalation_attempt = 2
# Hard stop after repeated failures per stage to prevent endless loops overnight.
per_morsel_stage_attempt_limit = 5
stage_attempt_window = "6h"
stage_cooldown = "1h"
complexity_escalation_minutes = 180
risky_review_labels = ["risk:high", "security", "migration", "breaking-change", "database"]
force_spark_at_weekly_usage_pct = 65

[dispatch.timeouts]
fast = "15m"
balanced = "45m"
premium = "120m"

[dispatch.git]
branch_prefix = "chum/"
branch_cleanup_days = 7
merge_strategy = "squash"
max_concurrent_per_project = 3

[chief]
enabled = true
matrix_room = "#chum-coordination"
model = "gpt-5.3-codex-spark"
agent_id = "chum-chief-scrum"
require_approved_plan = true

[crab]
enabled = true
tier = "fast"
max_morsels_per_plan = 20
max_scope_items = 10
auto_approve = false

[calcifier]
enabled = true
calcified_dir = ".cortex/calcified"
compile_threshold = 10      # consecutive LLM successes before compilation (base)
promote_threshold = 3       # shadow matches before promotion to active
risk_multiplier = 3         # multiplier for risky labels (10 × 3 = 30 for risk:high)
quarantine_on_nonzero = true
compile_model = "gemini-pro"
