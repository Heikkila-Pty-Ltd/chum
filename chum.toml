[tiers]
# Prefer cheap/fast first, then stronger models; keep broad fallback coverage.
fast = ["codex-spark", "codex-low", "gemini-2-5-flash", "gemini-3-0-flash-preview"]
balanced = ["codex-medium", "gemini-pro", "gemini-3-1-low", "gemini-2-5-flash", "gemini-3-0-flash-preview"]
premium = ["codex-high", "codex-extrahigh", "gemini-pro", "gemini-3-1-high", "gemini-3-1-low"]

[health]
check_interval = "2m"
gateway_unit = "openclaw-gateway.service"
gateway_user_service = true

[reporter]
channel = "matrix"
agent_id = "main"
matrix_bot_account = "spritzbot"
default_room = "!adJhqAxLcYqQuYraGf:vmi3041112.contaboserver.net"
admin_room = "!cUBDGkwSjaemsiueKq:vmi3041112.contaboserver.net" # DM with Hex for critical escalations
turtle_room = "!OHcxJdeesMjhMTvcvW:vmi3041112.contaboserver.net" # 3-agent deliberation channel
daily_digest_time = "09:00"
weekly_retro_day = "Monday"

[learner]
enabled = true
analysis_window = "48h"
cycle_interval = "6h"
include_in_digest = true

[api]
bind = "127.0.0.1:8900"

[dispatch.cli.codex]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.codex-low]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto", "-c", "model_reasoning_effort=low"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.codex-medium]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto", "-c", "model_reasoning_effort=medium"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.codex-high]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto", "-c", "model_reasoning_effort=high"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.codex-extrahigh]
cmd = "codex"
prompt_mode = "stdin"
args = ["exec", "--full-auto", "-c", "model_reasoning_effort=xhigh"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.claude]
cmd = "claude"
prompt_mode = "stdin"
args = ["--print", "--output-format", "json", "--dangerously-skip-permissions"]
model_flag = "--model"
approval_flags = []

[dispatch.cli.gemini]
cmd = "gemini"
prompt_mode = "stdin"
args = ["-p", "", "--yolo", "-o", "json"]
model_flag = "--model"
approval_flags = []

[dispatch.cli.gemini-aistudio]
cmd = "gemini-aistudio"
prompt_mode = "stdin"
args = ["-p", "", "--yolo", "-o", "json"]
model_flag = "--model"
approval_flags = []

[dispatch.cli.deepseek]
cmd = "deepseek"
prompt_mode = "stdin"
args = ["--json"]
model_flag = "-m"
approval_flags = []

[dispatch.cli.aider]
cmd = "aider"
prompt_mode = "file"
args = ["--yes-always"]
model_flag = "--model"
approval_flags = []

[dispatch.routing]
fast_backend = "headless_cli"
balanced_backend = "headless_cli"
premium_backend = "headless_cli"
comms_backend = "headless_cli"
retry_backend = "headless_cli"

[dispatch.cost_control]
enabled = true
spark_first = true
retry_escalation_attempt = 2
# Hard stop after repeated failures per stage to prevent endless loops overnight.
per_morsel_stage_attempt_limit = 3
stage_attempt_window = "6h"
complexity_escalation_minutes = 180
risky_review_labels = ["risk:high", "security", "migration", "breaking-change", "database"]
force_spark_at_weekly_usage_pct = 70
daily_cost_cap_usd = 1.0
per_morsel_cost_cap_usd = 0.10
pause_on_token_waste = true
token_waste_window = "6h"

[dispatch.cost_control.higher_learning]
enabled = true
max_retries = 1    # one shot per tier — fail fast, learn fast
max_handoffs = 1   # one cross-model review swap max

[dispatch.timeouts]
fast = "15m"
balanced = "30m"
premium = "60m"

[dispatch.git]
branch_prefix = "chum/"
branch_cleanup_days = 7
merge_strategy = "squash"
max_concurrent_per_project = 2

[chief]
enabled = true
matrix_room = "#chum-coordination"
model = "gpt-5.3-codex-spark"
agent_id = "chum-chief-scrum"
require_approved_plan = true

[crab]
enabled = true
tier = "fast"
max_morsels_per_plan = 20
max_scope_items = 10
auto_approve = false

[calcifier]
enabled = true
calcified_dir = ".cortex/calcified"
compile_threshold = 10      # consecutive LLM successes before compilation (base)
promote_threshold = 3       # shadow matches before promotion to active
risk_multiplier = 3         # multiplier for risky labels (10 × 3 = 30 for risk:high)
quarantine_on_nonzero = true
compile_model = "gemini-pro"
