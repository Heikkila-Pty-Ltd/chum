version: '3.8'

services:
  chum:
    build:
      context: ../..
      dockerfile: build/package/Dockerfile
    container_name: chum
    restart: unless-stopped
    ports:
      - "127.0.0.1:8900:8900"
    volumes:
      - ./chum.toml:/etc/chum/chum.toml:ro
      - chum-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CHUM_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8900/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chum-network

  # Optional: SQLite Web UI for debugging
  sqlite-web:
    image: coleifer/sqlite-web
    container_name: chum-sqlite-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - chum-data:/data:ro
    environment:
      - SQLITE_DATABASE=/data/chum.db
    profiles:
      - debug
    networks:
      - chum-network

volumes:
  chum-data:
    driver: local

networks:
  chum-network:
    driver: bridge
